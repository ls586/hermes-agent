name: Build and Push to ACR

on:
  push:
    tags: 
      - '*'

env:
  IMAGE_NAME: crpi-47tuusxlfu2z8ivm.cn-chengdu.personal.cr.aliyuncs.com/lsprivate/hermes-agent

jobs:
  build-and-push:
    if: github.repository == 'ls586/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Show tag name
        run: |
          echo "Triggered by tag: ${GITHUB_REF#refs/tags/}"
          echo "Tag name is: ${{ github.ref_name }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
