name: Build and Push to ACR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3)'
        required: true
        type: string
        default: 'v1.0.0'

env:
  REGISTRY: crpi-47tuusxlfu2z8ivm.cn-chengdu.personal.cr.aliyuncs.com
  IMAGE_NAME: lsprivate/hermes-agent

jobs:
  build-and-push:
    if: github.repository == 'ls586/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Determine build ref and tag
        id: build-info
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CHECKOUT_REF=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "CHECKOUT_REF=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.build-info.outputs.CHECKOUT_REF }}

      - name: Show tag name
        run: |
          echo "Building from tag: ${{ steps.build-info.outputs.TAG_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build-info.outputs.TAG_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
