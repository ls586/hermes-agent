name: Build and Push to ACR

on:
  push:
    tags: 
      - 'v*'
  workflow_dispatch: 
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3)'
        required: true
        type: string
        default: 'v1.0.0'

env:
  IMAGE_NAME: crpi-47tuusxlfu2z8ivm.cn-chengdu.personal.cr.aliyuncs.com/lsprivate/hermes-agent

jobs:
  build-and-push:
    if: github.repository == 'ls586/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Show tag name
        run: |
          echo "Triggered by tag: ${GITHUB_REF#refs/tags/}"
          echo "Tag name is: ${{ github.ref_name }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
