name: Docker Build and Push to ACR

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/docker-publish-acr.yml'
      - '.github/actions/hermes-smoke-test/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/docker-publish-acr.yml'
      - '.github/actions/hermes-smoke-test/**'
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: acr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # ----- 阿里云 ACR 配置（改成你自己的） -----
  ACR_REGISTRY: crpi-47tuusxlfu2z8ivm.cn-chengdu.personal.cr.aliyuncs.com      # 你的 ACR 地域
  ACR_NAMESPACE: lsprivate                        # 你的命名空间
  ACR_REPO_NAME: hermes-agent                        # 你的仓库名
  IMAGE_NAME: crpi-47tuusxlfu2z8ivm.cn-chengdu.personal.cr.aliyuncs.com/lsprivate/hermes-agent

jobs:
  # ---------------------------------------------------------------------------
  # Build amd64 natively, run smoke test, then push by digest
  # ---------------------------------------------------------------------------
  build-amd64:
    if: github.repository == 'your-username/your-repo'   # 改成你自己的仓库
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 本地构建并加载到 docker daemon，方便 smoke test
      - name: Build image (amd64, smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64

      # 可选的 smoke test（如果你有对应的 action 就保留，否则删掉或替换）
      - name: Smoke test image
        uses: ./.github/actions/hermes-smoke-test
        with:
          image: ${{ env.IMAGE_NAME }}:test

      # 登录 ACR（仅 push / release 时）
      - name: Log in to Alibaba Cloud ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 推送 amd64 镜像（仅 push / release 时，按 digest 推送）
      - name: Push amd64 by digest
        id: push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64

      - name: Export digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: digest-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build arm64 natively on ARM runner
  # ---------------------------------------------------------------------------
  build-arm64:
    if: github.repository == 'your-username/your-repo'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (arm64, smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/arm64
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,mode=max,scope=docker-arm64

      - name: Smoke test image
        uses: ./.github/actions/hermes-smoke-test
        with:
          image: ${{ env.IMAGE_NAME }}:test

      - name: Log in to Alibaba Cloud ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push arm64 by digest
        id: push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,mode=max,scope=docker-arm64

      - name: Export digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: digest-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Merge both per-arch digests into a multi-arch manifest and push tags
  # ---------------------------------------------------------------------------
  merge:
    if: github.repository == 'your-username/your-repo' && (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'release')
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    timeout-minutes: 10
    outputs:
      pushed_sha_tag: ${{ steps.mark_pushed.outputs.pushed }}
      pushed_release_tag: ${{ steps.mark_release_pushed.outputs.pushed }}
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          args=()
          for digest_file in *; do
            args+=("${IMAGE_NAME}@sha256:${digest_file}")
          done
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${TAG}" \
            "${args[@]}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${TAG}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Mark SHA tag pushed
        id: mark_pushed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Mark release tag pushed
        id: mark_release_pushed
        if: github.event_name == 'release'
        run: echo "pushed=true" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Move :main tag forward on every main push
  # ---------------------------------------------------------------------------
  move-main:
    if: |
      github.repository == 'your-username/your-repo'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.merge.outputs.pushed_sha_tag == 'true'
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: acr-move-main-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1000

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Decide whether to move :main
        id: main_check
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}"
          image_json=$(docker buildx imagetools inspect "${image}:main" --format '{{ json (index .Image "linux/amd64") }}' 2>/dev/null || true)
          if [ -z "${image_json}" ]; then
            echo "push_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          current_sha=$(echo "${image_json}" | jq -r '.config.Labels."org.opencontainers.image.revision" // ""')
          if [ -z "${current_sha}" ]; then
            echo "push_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Registry :main is at ${current_sha}"
          echo "This run is at      ${GITHUB_SHA}"
          if [ "${current_sha}" = "${GITHUB_SHA}" ]; then
            echo "push_main=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "${current_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main" || true
          fi
          if ! git cat-file -e "${current_sha}^{commit}" 2>/dev/null; then
            echo "push_main=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git merge-base --is-ancestor "${current_sha}" "${GITHUB_SHA}"; then
            echo "push_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "push_main=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Move :main to this SHA
        if: steps.main_check.outputs.push_main == 'true'
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:main" \
            "${IMAGE_NAME}:sha-${GITHUB_SHA}"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

  # ---------------------------------------------------------------------------
  # Move :latest tag forward on release
  # ---------------------------------------------------------------------------
  move-latest:
    if: |
      github.repository == 'your-username/your-repo'
      && github.event_name == 'release'
      && needs.merge.outputs.pushed_release_tag == 'true'
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: acr-move-latest
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1000

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Decide whether to move :latest
        id: latest_check
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}"
          image_json=$(docker buildx imagetools inspect "${image}:latest" --format '{{ json (index .Image "linux/amd64") }}' 2>/dev/null || true)
          if [ -z "${image_json}" ]; then
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          current_sha=$(echo "${image_json}" | jq -r '.config.Labels."org.opencontainers.image.revision" // ""')
          if [ -z "${current_sha}" ]; then
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Registry :latest is at ${current_sha}"
          echo "This release is at  ${GITHUB_SHA}"
          if [ "${current_sha}" = "${GITHUB_SHA}" ]; then
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "${current_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main" || true
          fi
          if ! git cat-file -e "${current_sha}^{commit}" 2>/dev/null; then
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git merge-base --is-ancestor "${current_sha}" "${GITHUB_SHA}"; then
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Move :latest to this release tag
        if: steps.latest_check.outputs.push_latest == 'true'
        env:
          RELEASE_TAG: ${{ needs.merge.outputs.release_tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${RELEASE_TAG}"
