name: Build and Push to ACR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 设置环境变量，方便复用
env:
  # 阿里云 ACR 个人版地址（地域自行替换）
  REGISTRY: crpi-47tuusxlfu2z8ivm.cn-chengdu.personal.cr.aliyuncs.com
  # 命名空间（改成你自己的）
  NAMESPACE: lsprivate
  # 镜像仓库名（改成你自己的）
  REPO_NAME: hermes-agent
  # 镜像 tag，这里用 commit SHA 前 7 位
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录阿里云 ACR
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. 构建并推送镜像
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .                    # Dockerfile 所在目录，默认仓库根目录
          push: true                    # 推送镜像
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}
            # 同时打一个 latest 标签
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:latest
          # 如果 Dockerfile 不在根目录，或名称不是 Dockerfile，可加上：
          # file: ./path/to/Dockerfile


